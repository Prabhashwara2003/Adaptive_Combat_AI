behaviors:
  CombatAI:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # Increased
      buffer_size: 20480     # Increased
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true         # Changed to true
      hidden_units: 512       # Increased brain size
      num_layers: 3           # Deeper network
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:              # NEW: Encourages exploration
        gamma: 0.99
        strength: 0.02
        encoding_size: 128
    keep_checkpoints: 10      # Keep more checkpoints
    max_steps: 3000000        # Train longer
    time_horizon: 128
    summary_freq: 5000        # Save more frequently
    
    # CURRICULUM LEARNING
    
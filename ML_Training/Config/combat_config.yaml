behaviors:
  CombatAI:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048       # Increased
      buffer_size: 20480     # Increased
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true         # Changed to true
      hidden_units: 512       # Increased brain size
      num_layers: 3           # Deeper network
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:              # NEW: Encourages exploration
        gamma: 0.99
        strength: 0.02
        encoding_size: 128
    keep_checkpoints: 10      # Keep more checkpoints
    max_steps: 5000        # Train longer
    time_horizon: 128
    summary_freq: 5000        # Save more frequentlybehaviors:
  CombatAI:
    trainer_type: ppo

    hyperparameters:
      batch_size: 1024        # Reduced — 2048 is too large for early training
      buffer_size: 10240      # Reduced to match — should be ~10x batch_size
      learning_rate: 0.0003
      beta: 0.005             # Entropy bonus — fine as is
      epsilon: 0.2            # PPO clip — fine as is
      lambd: 0.95             # GAE lambda — fine as is
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 256       # Reduced — 512 is overkill for 16 observations
      num_layers: 2           # Reduced — 3 layers risks vanishing gradients early
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      # Curiosity REMOVED — it was overriding combat rewards and teaching
      # the agent to explore rather than fight. Add it back after 200k steps
      # once the agent has learned basic combat behavior.

    max_steps: 1000000        # Total training steps — was 5000 which stopped training almost instantly
    time_horizon: 512         # How far back agent sees consequences — was 128, too short for combat
    
    keep_checkpoints: 10
    summary_freq: 5000

